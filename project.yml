name: FileHound
options:
  deploymentTarget:
    macOS: "11.0"
  postGenCommand: pod install
  swiftVersion: "5.10"
packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: 5.7.1
  MMKV:
    url: https://github.com/Tencent/MMKV
    from: 2.2.4
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.1
settings:
  base:
    SWIFT_VERSION: "5.10"
schemes:
  FileHound:
    build:
      targets:
        FileHound: all
    run:
      config: Debug
      executable: FileHound
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - FileHoundTests
        - FileHoundUITests
    profile:
      config: Release
      executable: FileHound
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      shared: true
      orderHint: 0
      isShown: true
targets:
  FileHound:
    type: application
    platform: macOS
    sources:
      - FileHound
    dependencies:
      - package: SnapKit
      - package: MMKV
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.vanjay.FileHound
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPARKLE_ENABLED"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_SUFeedURL: https://raw.githubusercontent.com/wangwanjie/FileHound/main/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: EMkumAR7FRbjJ6T5LhBcK7yIcGnJAuAjU5RZFEm12JE=
        CODE_SIGN_ENTITLEMENTS: FileHound/FileHound.entitlements
      configs:
        Debug:
          SWIFT_VERSION: "5.10"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: X6B6C6U6QV
          ENABLE_HARDENED_RUNTIME: YES
          SWIFT_VERSION: "5.10"
  FileHoundHelper:
    type: tool
    platform: macOS
    sources:
      - FileHoundHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.vanjay.FileHoundHelper
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: FileHoundHelper/FileHoundHelper.entitlements
      configs:
        Debug:
          SWIFT_VERSION: "5.10"
        Release:
          SWIFT_VERSION: "5.10"
  FileHoundTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - FileHoundTests
    dependencies:
      - target: FileHound
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.vanjay.FileHoundTests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          SWIFT_VERSION: "5.10"
        Release:
          SWIFT_VERSION: "5.10"
  FileHoundUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - FileHoundUITests
    dependencies:
      - target: FileHound
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.vanjay.FileHoundUITests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          SWIFT_VERSION: "5.10"
        Release:
          SWIFT_VERSION: "5.10"
